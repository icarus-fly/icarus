name: traqa
description: Your family's health, in words you understand.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^2.24.2
  firebase_auth: ^4.15.3
  cloud_firestore: ^4.13.6
  firebase_storage: ^11.5.6
  firebase_messaging: ^14.7.10
  cloud_functions: ^4.6.5
  google_sign_in: ^6.2.1

  # State management
  flutter_riverpod: ^2.4.9

  # Navigation
  go_router: ^12.1.3

  # UI
  google_fonts: ^6.1.0
  flutter_animate: ^4.3.0
  lottie: ^2.7.0
  flutter_svg: ^2.0.9

  # Image & Files
  image_picker: ^1.0.5
  file_picker: ^6.1.1

  # Charts
  fl_chart: ^0.65.0

  # Payments
  razorpay_flutter: ^1.3.5

  # Audio / TTS
  flutter_tts: ^4.0.2

  # Share
  share_plus: ^7.2.1
  screenshot: ^2.1.0

  # Notifications
  flutter_local_notifications: ^16.3.0

  # Network
  dio: ^5.4.0

  # Utils
  intl: ^0.18.1
  shared_preferences: ^2.2.2
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  url_launcher: ^6.2.4
  permission_handler: ^11.3.0
  connectivity_plus: ^5.0.2

  # PDF
  syncfusion_flutter_pdf: ^24.1.41

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.7

flutter:
  uses-material-design: true

  assets:
    - assets/logo/
    - assets/animations/
    - assets/sounds/

  fonts:
    - family: SpaceGrotesk
      fonts:
        - asset: assets/fonts/SpaceGrotesk-Regular.ttf
          weight: 400
        - asset: assets/fonts/SpaceGrotesk-Medium.ttf
          weight: 500
        - asset: assets/fonts/SpaceGrotesk-Bold.ttf
          weight: 700