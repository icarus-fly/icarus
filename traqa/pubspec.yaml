name: traqa
description: Your family's health, in words you understand.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
      sdk: flutter

  # State Management & Routing
  flutter_riverpod: ^3.3.1
  go_router: ^17.2.1

  # Firebase Core
  firebase_core: ^2.32.0
  firebase_auth: ^4.20.0
  cloud_firestore: ^4.17.5
  firebase_storage: ^11.7.7
  firebase_messaging: ^14.7.0
  firebase_analytics: ^10.9.0
  cloud_functions: ^4.7.0

  # Authentication
  google_sign_in: ^7.2.0

  # UI & Design
  google_fonts: ^8.0.2
  flutter_animate: ^4.5.2
  lottie: ^2.7.0
  flutter_svg: ^2.0.9
  shimmer: ^3.0.0

  # Media & Files
  image_picker: ^1.2.1
  file_picker: ^8.0.7
  permission_handler: ^11.0.1

  # Payments
  razorpay_flutter: ^1.4.4

  # Text-to-Speech
  flutter_tts: ^4.2.5

  # Sharing
  share_plus: ^10.0.0

  # Screenshots
  screenshot: ^3.0.0

  # Utilities
  intl: ^0.19.0
  shared_preferences: ^2.5.5
  url_launcher: ^6.2.4
  uuid: ^4.4.0
  equatable: ^2.0.5
  cached_network_image: ^3.4.0
  path_provider: ^2.1.1

  # AI & Processing
  http: ^1.1.0
  dio: ^5.9.2

  # Charting
  fl_chart: ^1.2.0
  syncfusion_flutter_charts: ^25.1.43
  flutter_local_notifications: ^21.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/logo/
    - assets/animations/
    - assets/sounds/
    - assets/fonts/
    - assets/images/

