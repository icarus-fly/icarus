<svg width="40" height="40" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
  <!-- Horizontal base bar of T — the biomarker timeline -->
  <line x1="4" y1="36" x2="36" y2="36" stroke="#00FF9F" stroke-width="1.5" stroke-linecap="round" opacity="0.9"/>
  <!-- Left data point dot -->
  <circle cx="4" cy="36" r="1.5" fill="#00FF9F"/>
  <!-- Right data point dot -->
  <circle cx="36" cy="36" r="1.5" fill="#00FF9F"/>
  <!-- DNA Helix left strand (curves up, forms left side of T top) -->
  <path d="M 8 36 C 8 28, 16 26, 16 18 C 16 10, 8 8, 8 2"
        stroke="#00FF9F" stroke-width="1.8" fill="none" stroke-linecap="round" opacity="0.85"/>
  <!-- DNA Helix right strand (mirror) -->
  <path d="M 32 36 C 32 28, 24 26, 24 18 C 24 10, 32 8, 32 2"
        stroke="#00FF9F" stroke-width="1.8" fill="none" stroke-linecap="round" opacity="0.85"/>
  <!-- DNA rungs (horizontal connections) — 4 rungs -->
  <line x1="10" y1="30" x2="30" y2="30" stroke="#00FF9F" stroke-width="1" opacity="0.5"/>
  <line x1="13" y1="24" x2="27" y2="24" stroke="#00FF9F" stroke-width="1" opacity="0.5"/>
  <line x1="13" y1="12" x2="27" y2="12" stroke="#00FF9F" stroke-width="1" opacity="0.5"/>
  <line x1="10" y1="6"  x2="30" y2="6"  stroke="#00FF9F" stroke-width="1" opacity="0.5"/>
  <!-- Top connection (crown of T) -->
  <line x1="8" y1="2" x2="32" y2="2" stroke="#00FF9F" stroke-width="2" stroke-linecap="round" opacity="0.9"/>
</svg>